rules:

  # ─── Injections SQL ───────────────────────────────────────────────────────
  - name: "SQL_INJECTION_UNION"
    description: "Tentative d'injection SQL via UNION SELECT"
    pattern: "UNION\\s+SELECT"
    severity: "CRITICAL"

  - name: "SQL_INJECTION_DROP"
    description: "Tentative de suppression de table via DROP TABLE"
    pattern: "DROP\\s+TABLE"
    severity: "CRITICAL"

  - name: "SQL_INJECTION_OR"
    description: "Injection SQL classique OR 1=1 ou OR 'a'='a'"
    pattern: "OR\\s+['\"]?1['\"]?\\s*=\\s*['\"]?1['\"]?"
    severity: "WARNING"

  - name: "SQL_INJECTION_SLEEP"
    description: "Injection SQL temporelle via SLEEP ou WAITFOR"
    pattern: "(SLEEP\\s*\\(|WAITFOR\\s+DELAY)"
    severity: "CRITICAL"

  # ─── Path Traversal ───────────────────────────────────────────────────────
  - name: "PATH_TRAVERSAL"
    description: "Tentative de remontée d'arborescence (../)"
    pattern: "(\\.\\./){2,}"
    severity: "CRITICAL"

  - name: "PATH_TRAVERSAL_ENCODED"
    description: "Path traversal encodé URL (%2e%2e)"
    pattern: "(%2e%2e|%2f|%5c){2,}"
    severity: "CRITICAL"

  # ─── Injection de commandes ───────────────────────────────────────────────
  - name: "CMD_INJECTION_SHELL"
    description: "Exécution de shell (/bin/sh, /bin/bash)"
    pattern: "/bin/(sh|bash|zsh|ksh)"
    severity: "CRITICAL"

  - name: "CMD_INJECTION_WGET_CURL"
    description: "Téléchargement via wget ou curl (possible C2)"
    pattern: "(wget|curl)\\s+https?://"
    severity: "CRITICAL"

  # ─── XSS ─────────────────────────────────────────────────────────────────
  - name: "XSS_SCRIPT_TAG"
    description: "Injection de balise <script>"
    pattern: "<script[^>]*>"
    severity: "WARNING"

  - name: "XSS_EVENT_HANDLER"
    description: "Injection via gestionnaire d'événements JS (onerror, onload...)"
    pattern: "on(error|load|click|mouseover|focus)\\s*="
    severity: "WARNING"

  - name: "XSS_JAVASCRIPT_URI"
    description: "Injection via URI javascript:"
    pattern: "javascript\\s*:"
    severity: "WARNING"

  # ─── Scanners & Outils offensifs ─────────────────────────────────────────
  - name: "SCANNER_NMAP"
    description: "Signature Nmap dans le payload"
    pattern: "Nmap"
    severity: "INFO"

  - name: "SCANNER_NIKTO"
    description: "User-Agent Nikto (scanner web)"
    pattern: "Nikto"
    severity: "WARNING"

  - name: "SCANNER_SQLMAP"
    description: "User-Agent sqlmap"
    pattern: "sqlmap"
    severity: "CRITICAL"

  - name: "SCANNER_METASPLOIT"
    description: "Signature Metasploit dans le payload"
    pattern: "Meterpreter|msfconsole|metasploit"
    severity: "CRITICAL"

  # ─── Protocoles dangereux / C2 ───────────────────────────────────────────
  - name: "SHELLCODE_NOP_SLED"
    description: "Possible NOP sled (shellcode x86)"
    pattern: "(\\x90){10,}"
    severity: "CRITICAL"

  - name: "BASE64_POWERSHELL"
    description: "Commande PowerShell encodée en Base64 (possible malware)"
    pattern: "powershell.*-[eE][nN][cC]"
    severity: "CRITICAL"

  - name: "REVERSE_SHELL_NC"
    description: "Reverse shell via netcat"
    pattern: "nc\\s+-[a-z]*e\\s"
    severity: "CRITICAL"

  # ─── Credential exposure ──────────────────────────────────────────────────
  - name: "FTP_CREDENTIALS"
    description: "Transmission de credentials FTP en clair"
    pattern: "^(USER|PASS)\\s+\\S+"
    severity: "WARNING"

  - name: "HTTP_AUTH_BASIC"
    description: "Authentification HTTP Basic (credentials en clair)"
    pattern: "Authorization:\\s*Basic\\s+"
    severity: "INFO"